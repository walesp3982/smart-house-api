[pytest]
# Configuración de pytest para Smart House API

# Directorio de tests
testpaths = tests

# Patrones para encontrar tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers personalizados
markers =
    requires_ollama: marca tests que requieren Ollama online
    unit: tests unitarios
    integration: tests de integración
    endpoint: tests del endpoint
    slow: tests lentos (> 1 segundo)
    fast: tests rápidos (< 1 segundo)

# Opciones de salida
addopts = 
    -ra
    --strict-markers
    --disable-warnings
    --tb=short

# Timeout para tests (30 segundos)
timeout = 30

# Minversion de pytest
minversion = 7.0
