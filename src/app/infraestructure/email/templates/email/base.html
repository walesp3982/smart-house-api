<div style="font-family: 'Segoe UI', Arial, Helvetica, sans-serif; background: #f7f7f7; padding: 32px 0;">
    <div style="max-width: 480px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px 24px;">

        {% block content%}{% endblock %}

        {% block footer%}
        <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 24px 0;">
        <p style="color: #a0aec0; font-size: 13px;">Si no solicitaste esta verificación, puedes ignorar este correo. Tu cuenta no será activada hasta que completes la verificación.</p>
        <p style="color: #a0aec0; font-size: 13px; margin-bottom: 0;">¡Gracias por confiar en Smart House!</p>
        {% endblock %}
    </div>
</div>
